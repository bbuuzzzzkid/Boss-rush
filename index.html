<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HELL RUSH 😈</title>
<style>
body { margin:0; overflow:hidden; background:#05050f; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

// 🎵 AUDIO
const bgm = new Audio("99477_Every_End....mp3");
bgm.loop = true;
bgm.volume = 0.4;

// ===== TIME SYSTEM =====
let last = performance.now();
let dt = 1;

// ===== INPUT =====
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// ===== GAME STATE =====
let started = false;
let hardcore = false;

let time = 0;
let bullets = [];
let shake = 0;

let bossLock = 3; // 😈 startup grace period

// ===== ARENA =====
let arena = {
    x:0, y:0,
    w:c.width,
    h:c.height
};

// ===== PLAYER =====
class Player {
    constructor(){
        this.x = c.width/2;
        this.y = c.height-120;
        this.hp = 100;
    }

    update(){
        let speed = 6 * dt;

        if(keys["ArrowLeft"]) this.x -= speed;
        if(keys["ArrowRight"]) this.x += speed;
        if(keys["ArrowUp"]) this.y -= speed;
        if(keys["ArrowDown"]) this.y += speed;

        this.x = Math.max(arena.x, Math.min(arena.x+arena.w, this.x));
        this.y = Math.max(arena.y, Math.min(arena.y+arena.h, this.y));
    }

    draw(){
        ctx.font="28px Arial";
        ctx.fillText("🧍",this.x,this.y);
    }
}

let player = new Player();

// ===== BULLET =====
class Bullet {
    constructor(x,y,vx,vy,type="normal"){
        this.x=x;
        this.y=y;
        this.vx=vx;
        this.vy=vy;
        this.type=type;
        this.dead=false;
    }

    update(){
        this.x += this.vx * dt;
        this.y += this.vy * dt;
    }

    draw(){
        ctx.font="16px Arial";
        ctx.fillText(this.type==="boss"?"💀":"🔴",this.x,this.y);
    }
}

// ===== HOMING BULLET (burst style) =====
class HomingBullet extends Bullet {
    constructor(x,y){
        super(x,y,0,0,"boss");
        this.life = 30;
    }

    update(){
        this.life -= dt;
        if(this.life <= 0){
            this.dead = true;
            return;
        }

        let dx = player.x - this.x;
        let dy = player.y - this.y;
        let m = Math.hypot(dx,dy) || 1;

        this.vx += (dx/m) * 10 * dt;
        this.vy += (dy/m) * 10 * dt;

        let sp = Math.hypot(this.vx,this.vy) || 1;
        let max = 5;

        this.vx = (this.vx/sp) * max;
        this.vy = (this.vy/sp) * max;

        super.update();
    }

    draw(){
        ctx.font="18px Arial";
        ctx.fillText("🟣",this.x,this.y);
    }
}

// ===== BOSS =====
class Boss {
    constructor(){
        this.x=c.width/2;
        this.y=120;

        this.attackTimer = 0;
        this.laserTimer = 0;
        this.laserX = 0;

        this.chargeTimer = 0;
        this.cx = 0;
        this.cy = 0;
    }

    update(){

        if(bossLock > 0){
            // 😈 wake-up phase movement only
            this.x += Math.sin(time * 5) * 0.5;
            return;
        }

        time += dt;

        this.x += (player.x - this.x) * 0.03 * dt;

        // ===== ATTACK LOOP =====
        this.attackTimer -= dt;

        if(this.attackTimer <= 0){
            this.attackTimer = Math.max(0.25, 0.8 - time/200);

            this.barrage();
            if(Math.random() < 0.3) this.spiral();
            if(Math.random() < 0.2) this.ring();
            if(Math.random() < 0.2) this.homing();
        }

        // ===== LASER =====
        this.laserTimer -= dt;

        if(this.laserTimer <= 0){
            this.laserTimer = 5;
            this.laserX = player.x;
        }

        if(this.laserTimer < 2){
            if(Math.abs(player.x - this.laserX) < 40){
                kill();
            }
        }

        // ===== CHARGE =====
        this.chargeTimer -= dt;

        if(this.chargeTimer <= 0){
            this.chargeTimer = 6;

            let dx = player.x - this.x;
            let dy = player.y - this.y;
            let m = Math.hypot(dx,dy) || 1;

            this.cx = dx/m;
            this.cy = dy/m;
        } else if(this.chargeTimer < 0.5){
            this.x += this.cx * 14 * dt;
            this.y += this.cy * 14 * dt;

            if(Math.hypot(player.x-this.x,player.y-this.y)<45){
                kill();
            }
        }
    }

    barrage(){
        let dx = player.x - this.x;
        let dy = player.y - this.y;
        let m = Math.hypot(dx,dy) || 1;

        bullets.push(new Bullet(this.x,this.y,dx/m*8,dy/m*8,"boss"));
    }

    spiral(){
        let a = time * 2;
        bullets.push(new Bullet(this.x,this.y,Math.cos(a)*7,Math.sin(a)*7,"boss"));
    }

    ring(){
        let n = 14;
        for(let i=0;i<n;i++){
            let a = i*(Math.PI*2/n) + time;
            bullets.push(new Bullet(this.x,this.y,Math.cos(a)*6,Math.sin(a)*6,"boss"));
        }
    }

    homing(){
        bullets.push(new HomingBullet(this.x,this.y));
    }

    draw(){
        ctx.font="40px Arial";
        ctx.fillText("👹",this.x,this.y);

        if(bossLock > 0){
            ctx.fillStyle="white";
            ctx.font="20px Arial";
            ctx.fillText("GET READY...",this.x-60,this.y-60);
        }

        if(this.laserTimer < 2){
            ctx.beginPath();
            ctx.moveTo(this.laserX,0);
            ctx.lineTo(this.laserX,c.height);
            ctx.strokeStyle="red";
            ctx.lineWidth=6;
            ctx.stroke();
        }
    }
}

let boss = new Boss();

// ===== HELPERS =====
function kill(){
    if(bossLock > 0) return;

    shake = 10;

    if(hardcore){
        reset();
    } else {
        player.hp -= 20;
        if(player.hp <= 0) reset();
    }
}

function reset(){
    started = false;
    time = 0;
    bullets = [];
    player = new Player();
    boss = new Boss();
    bossLock = 3;
}

// ===== LOOP =====
function loop(now){
    dt = (now - last) / 16.67;
    last = now;

    ctx.clearRect(0,0,c.width,c.height);

    let ox=0,oy=0;
    if(shake>0){
        ox=(Math.random()-0.5)*shake;
        oy=(Math.random()-0.5)*shake;
        shake*=0.9;
    }

    ctx.save();
    ctx.translate(ox,oy);

    if(!started){
        ctx.fillStyle="white";
        ctx.font="30px Arial";
        ctx.fillText("PRESS 1 NORMAL / 2 HARDCORE 😈",c.width/2-280,c.height/2);

        if(keys["1"]){
            started=true;
            hardcore=false;
            bgm.currentTime=0;
            bgm.play();
        }

        if(keys["2"]){
            started=true;
            hardcore=true;
            bgm.currentTime=0;
            bgm.play();
        }

        ctx.restore();
        requestAnimationFrame(loop);
        return;
    }

    if(bossLock > 0){
        bossLock -= dt;
    }

    player.update();
    player.draw();

    boss.update();
    boss.draw();

    for(let b of bullets){
        b.update();
        b.draw();

        if(Math.hypot(player.x-b.x, player.y-b.y) < 18){
            b.dead = true;
            kill();
        }
    }

    bullets = bullets.filter(b => !b.dead);

    ctx.restore();
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
