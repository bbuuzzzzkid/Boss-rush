<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rogue Boss Rush 😈🎲</title>
<style>
body { margin:0; overflow:hidden; background:#060610; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

const GRAVITY = 0.8;

let bullets = [];

let gameTime = 0; // 🎲 10 minute run = ~600 seconds @ 60fps
let bossIndex = 0;

const bossOrder = shuffle([1,2,3,4,5]);

function shuffle(arr){
  return arr.sort(()=>Math.random()-0.5);
}

class Player {
  constructor(){
    this.x = 120;
    this.y = 200;
    this.vx = 0;
    this.vy = 0;
    this.onGround = false;
    this.hp = 100;
  }

  update(){
    this.vx = 0;

    if(keys["ArrowLeft"]) this.vx = -6;
    if(keys["ArrowRight"]) this.vx = 6;

    if(keys[" "] && this.onGround){
      this.vy = -15;
      this.onGround = false;
    }

    this.vy += GRAVITY;

    this.x += this.vx;
    this.y += this.vy;

    if(this.y > c.height - 90){
      this.y = c.height - 90;
      this.vy = 0;
      this.onGround = true;
    }
  }

  draw(){
    ctx.font="30px Arial";
    ctx.fillText("🧍‍♂️", this.x, this.y);
  }
}

class Bullet {
  constructor(x,y,vx,vy){
    this.x=x; this.y=y;
    this.vx=vx; this.vy=vy;
  }

  update(){
    this.x += this.vx;
    this.y += this.vy;
  }

  draw(){
    ctx.font="16px Arial";
    ctx.fillText("🔴", this.x, this.y);
  }
}

class Boss {
  constructor(type){
    this.type = type;
    this.x = c.width/2;
    this.y = 120;
    this.hp = 2000 + type*1500;
    this.t = 0;
    this.phase = 1;
  }

  update(player){
    this.t++;

    // 🧠 tracking movement
    this.x += (player.x - this.x) * 0.015;

    if(this.hp < 0) return;

    // 🔥 phase system (THIS is what makes it roguelike-feeling)
    if(this.hp < 0.6*this.maxHp) this.phase = 2;
    if(this.hp < 0.3*this.maxHp) this.phase = 3;

    let rate = 60 - this.type*5;

    if(this.phase === 2) rate *= 0.7;
    if(this.phase === 3) rate *= 0.5;

    if(this.t % Math.max(rate,12) === 0){
      this.attack(player);
    }
  }

  attack(player){
    let dx = player.x - this.x;
    let dy = player.y - this.y;
    let m = Math.hypot(dx,dy);

    let speed = 5 + this.phase;

    // 🎲 different boss styles per run
    if(this.type === 1){
      bullets.push(new Bullet(this.x,this.y,dx/m*speed,dy/m*speed));
    }

    if(this.type === 2){
      for(let i=-1;i<=1;i++){
        bullets.push(new Bullet(this.x,this.y,dx/m*speed + i,dy/m*speed));
      }
    }

    if(this.type === 3){
      let a = Math.random()*Math.PI*2;
      bullets.push(new Bullet(this.x,this.y,Math.cos(a)*6,Math.sin(a)*6));
    }

    if(this.type === 4){
      for(let i=0;i<8;i++){
        let a = i*Math.PI/4 + this.t*0.02;
        bullets.push(new Bullet(this.x,this.y,Math.cos(a)*7,Math.sin(a)*7));
      }
    }

    if(this.type === 5){
      for(let i=0;i<12;i++){
        let a = i*Math.PI/6 + this.t*0.03;
        bullets.push(new Bullet(this.x,this.y,Math.cos(a)*8,Math.sin(a)*8));
      }
    }
  }

  draw(){
    let icons = ["👾","👹","🧟","🐉","💀"];
    ctx.font="38px Arial";
    ctx.fillText(icons[this.type-1], this.x, this.y);
  }
}

let player = new Player();
let boss = new Boss(bossOrder[bossIndex]);

function hit(a,b){
  return Math.abs(a.x-b.x)<25 && Math.abs(a.y-b.y)<25;
}

function nextBoss(){
  bossIndex++;
  if(bossIndex >= bossOrder.length){
    alert("RUN COMPLETE 😈🎲 (you survived the roguelike)");
    location.reload();
  } else {
    boss = new Boss(bossOrder[bossIndex]);
  }
}

function loop(){
  gameTime++;

  ctx.clearRect(0,0,c.width,c.height);

  player.update();
  player.draw();

  boss.update(player);
  boss.draw();

  // 🔴 SAFE BULLET SYSTEM (fixes your bug)
  bullets.forEach(b=>{
    b.update();
    b.draw();
  });

  bullets = bullets.filter(b =>
    b.x > -100 && b.x < c.width+100 &&
    b.y > -100 && b.y < c.height+100
  );

  // collisions
  bullets.forEach((b,i)=>{
    if(hit(player,b)){
      player.hp -= 10;
      bullets.splice(i,1);
    }
  });

  if(hit(player,boss)){
    player.hp -= 0.2;
  }

  if(boss.hp <= 0){
    nextBoss();
  }

  if(player.hp <= 0){
    alert("ROGUE RUN FAILED 💀");
    location.reload();
  }

  if(gameTime > 60*60*10){
    alert("10 MIN SURVIVED 😈🔥 LEGEND");
    location.reload();
  }

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
