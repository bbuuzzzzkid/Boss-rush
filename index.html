<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HELL RUSH 😈</title>
<style>
body { margin:0; overflow:hidden; background:#05050f; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
const bgm = new Audio("99477_Every_End....mp3")
bgm.loop = true
bgm.volume = 0.4
c.width = window.innerWidth;
c.height = window.innerHeight;

// ===== INPUT =====
let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// ===== GAME STATE =====
let started = false;
let hardcore = false;
let time = 0;
let bullets = [];
let shake = 0;

// ===== ARENA =====
let arena = {
    x:0, y:0,
    w:c.width,
    h:c.height
};

// ===== PLAYER =====
class Player {
    constructor(){
        this.x = c.width/2;
        this.y = c.height-80;
        this.hp = 100;
    }

    update(){
        if(keys["ArrowLeft"]) this.x -= 6;
        if(keys["ArrowRight"]) this.x += 6;
        if(keys["ArrowUp"]) this.y -= 6;
        if(keys["ArrowDown"]) this.y += 6;

        this.x = Math.max(arena.x, Math.min(arena.x+arena.w, this.x));
        this.y = Math.max(arena.y, Math.min(arena.y+arena.h, this.y));
    }

    draw(){
        ctx.font="28px Arial";
        ctx.fillText("🧍", this.x, this.y);
    }
}

let player = new Player();

// ===== BULLETS =====
class Bullet {
    constructor(x,y,vx,vy,type="normal"){
        this.x=x; this.y=y;
        this.vx=vx; this.vy=vy;
        this.type=type;
        this.dead=false;
    }

    update(){
        this.x += this.vx;
        this.y += this.vy;
    }

    draw(){
        ctx.font="16px Arial";
        ctx.fillText(this.type==="boss"?"💀":"🔴",this.x,this.y);
    }
}

// ===== HOMING =====
class HomingBullet extends Bullet {
    update(){
        let dx = player.x - this.x;
        let dy = player.y - this.y;
        let m = Math.hypot(dx,dy);

        this.vx += (dx/m)*0.35;
        this.vy += (dy/m)*0.35;

        let sp = Math.hypot(this.vx,this.vy);
        this.vx = (this.vx/sp)*6;
        this.vy = (this.vy/sp)*6;

        super.update();
    }

    draw(){
        ctx.font="18px Arial";
        ctx.fillText("🔴",this.x,this.y);
    }
}

// ===== BOSS =====
class Boss {
    constructor(){
        this.x=c.width/2;
        this.y=120;
        this.t=0;

        this.laserTimer=0;
        this.laserX=0;

        this.cx=0;
        this.cy=0;
        this.chargeTimer=0;
    }

    update(){
        this.t++;
        time++;

        this.x += (player.x-this.x)*0.03;

        let speed = 5 + time/800;
        let rate = Math.max(16 - time/250, 4);

        // attacks
        if(this.t%rate===0) this.barrage(speed);
        if(this.t%23===0) this.spiral();
        if(this.t%60===0) this.ring();
        if(this.t%140===0) this.homing();

        // laser
        if(this.t%300===0){
            this.laserTimer=180;
            this.laserX=player.x;
        }

        if(this.laserTimer>0){
            this.laserTimer--;
            if(this.laserTimer<120){
                if(Math.abs(player.x-this.laserX)<40){
                    kill();
                }
            }
        }

        // charge
        if(this.t%420===0){
            let dx=player.x-this.x;
            let dy=player.y-this.y;
            let m=Math.hypot(dx,dy);

            this.cx=dx/m;
            this.cy=dy/m;
            this.chargeTimer=40;
        }

        if(this.chargeTimer>0){
            this.chargeTimer--;
            this.x+=this.cx*14;
            this.y+=this.cy*14;

            if(Math.hypot(player.x-this.x,player.y-this.y)<45){
                kill();
            }
        }
    }

    barrage(speed){
        let dx=player.x-this.x;
        let dy=player.y-this.y;
        let m=Math.hypot(dx,dy);

        bullets.push(new Bullet(this.x,this.y,dx/m*speed,dy/m*speed,"boss"));
    }

    spiral(){
        let a=time*0.2;
        bullets.push(new Bullet(this.x,this.y,Math.cos(a)*7,Math.sin(a)*7,"boss"));
    }

    ring(){
        let n=12+Math.floor(time/200);
        for(let i=0;i<n;i++){
            let a=i*(Math.PI*2/n)+time*0.01;
            bullets.push(new Bullet(this.x,this.y,Math.cos(a)*6,Math.sin(a)*6,"boss"));
        }
    }

    homing(){
        bullets.push(new HomingBullet(this.x,this.y,(Math.random()-0.5)*4,(Math.random()-0.5)*4,"boss"));
    }

    draw(){
        ctx.font="40px Arial";
        ctx.fillText("👹",this.x,this.y);

        if(this.laserTimer>0){
            ctx.beginPath();
            ctx.moveTo(this.laserX,0);
            ctx.lineTo(this.laserX,c.height);
            ctx.strokeStyle=this.laserTimer>60?"yellow":"red";
            ctx.lineWidth=6;
            ctx.stroke();
        }

        let p=Math.min(time/(60*7*60),1);
        ctx.fillStyle="white";
        ctx.fillRect(20,20,300*p,10);
    }
}

let boss=new Boss();

// ===== HELPERS =====
function hit(a,b){
    return Math.abs(a.x-b.x)<20 && Math.abs(a.y-b.y)<20;
}

function kill(){
    shake=10;

    if(hardcore){
        reset();
    }else{
        player.hp-=20;
        if(player.hp<=0) reset();
    }
}

function reset(){
    started=false;
    time=0;
    bullets=[];
    player=new Player();
    boss=new Boss();
    arena={x:0,y:0,w:c.width,h:c.height};
    bgm.pause();
    bgm.currentTime = 0;
}

// ===== LOOP =====
function loop(){
    ctx.clearRect(0,0,c.width,c.height);

    // timer
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("TIME: " + (time / 60).toFixed(1) + "s", 20, 40);

    // shake
    let ox=0,oy=0;
    if(shake>0){
        ox=(Math.random()-0.5)*shake;
        oy=(Math.random()-0.5)*shake;
        shake*=0.9;
    }

    ctx.save();
    ctx.translate(ox,oy);

    if(!started){
    ctx.save();

    // background vibe (slight dim so menu feels separate)
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0,0,c.width,c.height);

    ctx.textAlign = "center";

    // ===== TITLE =====
    ctx.fillStyle = "white";
    ctx.font = "bold 60px Arial";
    ctx.fillText("Bullet Rush:", c.width/2, c.height/2 - 120);

    // bold SURVIVE part
    ctx.font = "bold 70px Arial";
    ctx.fillStyle = "red";
    ctx.fillText("SURVIVE", c.width/2, c.height/2 - 50);

    // ===== OPTIONS =====
    ctx.fillStyle = "white";
    ctx.font = "24px Arial";
    ctx.fillText("PRESS 1 FOR NORMAL", c.width/2, c.height/2 + 40);
    ctx.fillText("PRESS 2 FOR HARDCORE 😈", c.width/2, c.height/2 + 80);

    // small hint text
    ctx.fillStyle = "#aaaaaa";
    ctx.font = "16px Arial";
    ctx.fillText("dodge bullets. survive the chaos. (60 FPS recommended, trust me.)", c.width/2, c.height/2 + 140);

    ctx.restore();

    // ===== INPUT HANDLING =====
    if(keys["1"]){
        started = true;
        hardcore = false;

        bgm.currentTime = 0;
        bgm.play();
    }

    if(keys["2"]){
        started = true;
        hardcore = true;

        bgm.currentTime = 0;
        bgm.play();
    }

    requestAnimationFrame(loop);
    return;
}

    player.update();
    player.draw();

    boss.update();
    boss.draw();

    ctx.strokeStyle="red";
    ctx.strokeRect(arena.x,arena.y,arena.w,arena.h);

    for(let b of bullets){
        b.update();
        b.draw();

        if(hit(player,b)){
            b.dead=true;
            kill();
        }
    }

    bullets=bullets.filter(b=>!b.dead);

    ctx.restore();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
