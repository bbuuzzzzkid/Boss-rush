<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>7 Min Hell Mode 😈🔥</title>
<style>
body { margin:0; overflow:hidden; background:#050510; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

c.width = window.innerWidth;
c.height = window.innerHeight;

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let started = false;
let time = 0;
let bullets = [];

class Player {
  constructor(){
    this.x = c.width/2;
    this.y = c.height - 80;
    this.hp = 100;
  }

  update(){
    if(keys["ArrowLeft"]) this.x -= 7;
    if(keys["ArrowRight"]) this.x += 7;
    if(keys["ArrowUp"]) this.y -= 7;
    if(keys["ArrowDown"]) this.y += 7;

    this.x = Math.max(0, Math.min(c.width, this.x));
    this.y = Math.max(0, Math.min(c.height, this.y));
  }

  draw(){
    ctx.font = "30px Arial";
    ctx.fillText("🧍‍♂️", this.x, this.y);
  }
}

class Bullet {
  constructor(x,y,vx,vy,type="normal"){
    this.x=x; this.y=y;
    this.vx=vx; this.vy=vy;
    this.type=type;
    this.dead=false;
  }

  update(){
    this.x += this.vx;
    this.y += this.vy;
  }

  draw(){
    ctx.font="16px Arial";
    ctx.fillText(this.type==="boss"?"💀":"🔴", this.x, this.y);
  }
}

class BossAI {
  constructor(){
    this.x = c.width/2;
    this.y = 120;
    this.t = 0;
  }

  update(player){
    this.t++;
    time++;

    // 🧠 aggressive tracking
    this.x += (player.x - this.x) * 0.03;

    let speed = 6 + time/900; // ramps HARD

    // 🔥 FAST ATTACK RATE (insane difficulty)
    let rate = Math.max(18 - time/300, 6);

    if(this.t % rate === 0){
      this.barrage(player, speed);
    }

    if(this.t % 25 === 0){
      this.spiral();
    }

    if(this.t % 70 === 0){
      this.ring(10 + Math.floor(time/60));
    }

    if(Math.random() < 0.05){
      this.randomBurst();
    }
  }

  barrage(player, speed){
    let dx = player.x - this.x;
    let dy = player.y - this.y;
    let m = Math.hypot(dx,dy);

    bullets.push(new Bullet(
      this.x,this.y,
      dx/m*speed,
      dy/m*speed,
      "boss"
    ));
  }

  spiral(){
    let a = time * 0.25;
    bullets.push(new Bullet(
      this.x,this.y,
      Math.cos(a)*7,
      Math.sin(a)*7,
      "boss"
    ));
  }

  ring(n){
    for(let i=0;i<n;i++){
      let a = (Math.PI*2*i)/n + time*0.01;
      bullets.push(new Bullet(
        this.x,this.y,
        Math.cos(a)*(6+time/800),
        Math.sin(a)*(6+time/800),
        "boss"
      ));
    }
  }

  randomBurst(){
    for(let i=0;i<8;i++){
      let a = Math.random()*Math.PI*2;
      bullets.push(new Bullet(
        this.x,this.y,
        Math.cos(a)*9,
        Math.sin(a)*9,
        "boss"
      ));
    }
  }

  draw(){
    ctx.font="40px Arial";
    ctx.fillText("👹", this.x, this.y);
  }
}

function hit(a,b){
  return Math.abs(a.x-b.x)<20 && Math.abs(a.y-b.y)<20;
}

let player = new Player();
let boss = new BossAI();

function loop(){
  ctx.clearRect(0,0,c.width,c.height);

  // 🧠 START SCREEN (SPACE TO BEGIN)
  if(!started){
    ctx.fillStyle="white";
    ctx.font="30px Arial";
    ctx.fillText("PRESS SPACE TO START 😈🔥", c.width/2 - 200, c.height/2);
    if(keys[" "]){
      started = true;
    }
    requestAnimationFrame(loop);
    return;
  }

  time++;

  player.update();
  player.draw();

  boss.update(player);
  boss.draw();

  // 🔴 bullets safe update
  for(let b of bullets){
    b.update();
    b.draw();

    if(hit(player,b)){
      player.hp -= (b.type==="boss"?7:5);
      b.dead = true;
    }
  }

  bullets = bullets.filter(b =>
    !b.dead &&
    b.x>-100 && b.x<c.width+100 &&
    b.y>-100 && b.y<c.height+100
  );

  // ⏱️ 7 MIN WIN CONDITION
  if(time > 60 * 60 * 7){
    alert("YOU SURVIVED 7 MIN HELL 😈🔥");
    location.reload();
  }

  if(player.hp <= 0){
    alert("YOU DIED 💀");
    location.reload();
  }

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
